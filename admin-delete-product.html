<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Product | Coffee Roots</title>
  <link rel="stylesheet" href="admin-style.css">
</head>
<body>

  <!-- Navbar -->
  <header class="navbar">
    <div class="brand">Coffee Roots</div>
    <nav class="nav-links">
      <a href="admin-dashboard.html">Dashboard</a>
      <a href="#">Products</a>
      <a href="#">Contact</a>
    </nav>
  </header>

  <!-- Main -->
  <main class="delete-page">

    <div class="delete-box">

      <h1>Delete Product</h1>
      <p class="warning-text">
        Are you sure you want to delete this product?
      </p>

      <!-- Product Info -->
      <div class="product-preview">
        <img src="images/coffee1.jpg" alt="product">

        <div class="product-details">
          <h3>Ethiopian Yirgacheffe</h3>
          <p>Light Roast</p>

          <div class="info-row">
            <span>Category:</span>
            <strong>Coffee Beans</strong>
          </div>

          <div class="info-row">
            <span>Price:</span>
            <strong>$18.99</strong>
          </div>

          <div class="info-row">
            <span>Stock:</span>
            <strong>24</strong>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="delete-actions">
        <a href="admin-dashboard.html" class="cancel-btn">
          Cancel
        </a>

        <a href="admin-dashboard.html" class="confirm-btn">
          Confirm Delete
        </a>
      </div>

    </div>

  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-col">
      <h3>Coffee Roots</h3>
      <p>Premium specialty coffee roasted to perfection.</p>
    </div>
  </footer>

</body>
</html>
