<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Delete Product | Coffee Roots</title>
  <link rel="stylesheet" href="../css/admin-style.css" />
  <link rel="stylesheet" href="../css/Super-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>


  <!-- Main -->
  <main class="delete-page">

    <div class="delete-box">

      <h1>Delete Product</h1>
      <p class="warning-text">
        Are you sure you want to delete this product?
      </p>

      <!-- Product Info -->
      <div class="product-preview">
        <img src="../img/ethiopian yirgacheffe.jpg" alt="product">

        <div class="product-details">
          <h3>Ethiopian Yirgacheffe</h3>
          <p>Light Roast</p>

          <div class="info-row">
            <span>Category:</span>
            <strong>Coffee Beans</strong>
          </div>

          <div class="info-row">
            <span>Price:</span>
            <strong>$18.99</strong>
          </div>

          <div class="info-row">
            <span>Stock:</span>
            <strong>24</strong>
          </div>
        </div>
      </div>

      <!-- Buttons -->
      <div class="delete-actions">
        <a href="../html/admin-dashboard.html" class="cancel-btn">
          Cancel
        </a>

        <a href="../html/admin-dashboard.html" class="confirm-btn">
          Confirm Delete
        </a>
      </div>

    </div>

  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script>
    const pageType = "admin";
  </script>
  <script src="../js/components.js"></script>

</body>
</html>
