<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Details | Coffee Roots</title>
  <link rel="stylesheet" href="../css/admin-style.css" />
  <link rel="stylesheet" href="../css/Super-style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- NAVBAR (injected by components.js) -->
  <div id="navbar-placeholder"></div>

  <main class="product-details-page">
    <div class="product-details-container">

      <div class="product-image-card">
        <img src="../img/ethiopian yirgacheffe.jpg" alt="Ethiopian Yirgacheffe" class="product-details-image" />
      </div>

      <div class="product-info-card">
        <span class="product-badge">Coffee Beans</span>
        <h1>Ethiopian Yirgacheffe</h1>
        <p class="product-roast">Light Roast</p>

        <div class="product-price">$18.99</div>

        <p class="product-description">
          Premium Ethiopian coffee beans with fruity aroma and smooth taste.
          Freshly roasted and carefully selected for a rich coffee experience.
        </p>

        <div class="product-meta">
          <div class="meta-item">
            <span class="meta-label">Category</span>
            <strong>Coffee Beans</strong>
          </div>
          <div class="meta-item">
            <span class="meta-label">Stock</span>
            <strong>24 Available</strong>
          </div>
        </div>

        <div class="product-actions">
          <a href="../html/cart.html" class="buy-btn">
            <i class="fa-solid fa-cart-plus"></i> Add To Cart
          </a>
          <a href="../html/Main.html#products" class="back-btn">Back</a>
        </div>
      </div>

    </div>
  </main>

  <!-- FOOTER (injected by components.js) -->
  <div id="footer-placeholder"></div>

  <!-- Set page type before loading shared components -->
  <script>
    const pageType = "customer";
  </script>
  <script src="../js/components.js"></script>

</body>
</html>
