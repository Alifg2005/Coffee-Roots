<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Your Cart - Coffee Roots</title>
  <link rel="stylesheet" href="../css/cart-style.css" />
  <link rel="stylesheet" href="../css/Super-style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

  <!-- NAVBAR (injected by components.js) -->
  <div id="navbar-placeholder"></div>

  <main class="cart-section">
    <div class="cart-header">
      <h1 class="cart-title">Your Cart</h1>
      <div class="cart-header-actions">
        <a href="../html/Main.html#products" class="continue-shopping">&larr; Continue Shopping</a>
        <button class="clear-cart-btn" onclick="clearCart()">
          <i class="fa-solid fa-trash"></i> Clear All
        </button>
      </div>
    </div>

    <div class="cart-container">
      <div class="cart-items" id="cart-items">
        
        <div class="cart-item">
          <img src="../img/ethiopian yirgacheffe.jpg" alt="Ethiopian Yirgacheffe" class="cart-item-img" />
          <div class="cart-item-info">
            <p class="cart-item-category">Coffee Beans</p>
            <h3 class="cart-item-name">Ethiopian Yirgacheffe</h3>
            <p class="cart-item-roast">Light Roast</p>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn">-</button>
            <span class="qty-num">1</span>
            <button class="qty-btn">+</button>
          </div>
          <div class="cart-item-price">$18.99</div>
          <button class="cart-item-remove" aria-label="Remove item"><i class="fa-solid fa-trash"></i></button>
        </div>

        <div class="cart-item">
          <img src="../img/Colombian Supremo.jpg" alt="Colombian Supremo" class="cart-item-img" />
          <div class="cart-item-info">
            <p class="cart-item-category">Coffee Beans</p>
            <h3 class="cart-item-name">Colombian Supremo</h3>
            <p class="cart-item-roast">Medium Roast</p>
          </div>
          <div class="cart-item-qty">
            <button class="qty-btn">-</button>
            <span class="qty-num">2</span>
            <button class="qty-btn">+</button>
          </div>
          <div class="cart-item-price">$33.98</div>
          <button class="cart-item-remove" aria-label="Remove item"><i class="fa-solid fa-trash"></i></button>
        </div>

      </div>

      <div class="cart-summary">
        <h3 class="summary-title">Order Summary</h3>
        <div class="summary-row">
          <span>Subtotal</span>
          <span>$52.97</span>
        </div>
        <div class="summary-row">
          <span>Shipping</span>
          <span>Calculated at checkout</span>
        </div>
        <hr class="summary-divider" />
        <div class="summary-row summary-total">
          <span>Total</span>
          <span>$52.97</span>
        </div>
        <div class="payment-methods">
          <h4 class="payment-title">Payment Method</h4>

          <label class="payment-option">
            <input type="radio" name="payment" value="card" checked />
            <i class="fa-solid fa-credit-card"></i>
            Credit / Debit Card
          </label>

          <label class="payment-option">
            <input type="radio" name="payment" value="cash" />
            <i class="fa-solid fa-money-bill-wave"></i>
            Cash on Delivery
          </label>

          <label class="payment-option">
            <input type="radio" name="payment" value="stcpay" />
            <i class="fa-solid fa-mobile-screen"></i>
            STC Pay
          </label>

          <label class="payment-option">
            <input type="radio" name="payment" value="applepay" />
            <i class="fa-brands fa-apple"></i>
            Apple Pay
          </label>
        </div>

        <button class="btn btn-dark checkout-btn">Proceed to Checkout</button>
      </div>
    </div>
  </main>

  <!-- FOOTER (injected by components.js) -->
  <div id="footer-placeholder"></div>

  <script>
    const pageType = "customer";
  </script>
  <script src="../js/components.js"></script>

</body>
</html>
