<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Product | Coffee Roots</title>
  <link rel="stylesheet" href="../css/admin-style.css" />
  <link rel="stylesheet" href="../css/Super-style.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>

  <!-- Navbar -->
  <div id="navbar-placeholder"></div>

  <main class="add-product-page">
    <div class="add-product-box">
      <h1>Edit Product</h1>
      <p class="form-subtitle">Update the product details below</p>

      <form class="add-product-form" action="../html/admin-dashboard.html" method="get">

        <div class="form-group">
          <label for="product-name">Product Name</label>
          <input type="text" id="product-name" placeholder="Enter product name" value="Ethiopian Yirgacheffe" required />
        </div>

        <div class="form-group">
          <label for="product-description">Description</label>
          <textarea id="product-description" rows="4" placeholder="Enter product description" required>Bright, floral cup with notes of jasmine, lemon, and sweet berries.</textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="category">Category</label>
            <select id="category" required>
              <option>Select category</option>
              <option selected>Coffee Beans</option>
              <option>Ground Coffee</option>
              <option>Blends</option>
              <option>Accessories</option>
              <option>Brewing Equipment</option>
            </select>
          </div>

          <div class="form-group">
            <label for="roast">Roast Type</label>
            <input type="text" id="roast" placeholder="e.g. Light Roast" value="Light Roast" required />
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="price">Price</label>
            <input type="number" id="price" step="0.01" placeholder="Enter price" value="18.99" required />
          </div>

          <div class="form-group">
            <label for="stock">Stock</label>
            <input type="number" id="stock" placeholder="Enter stock quantity" value="24" required />
          </div>
        </div>

        <div class="form-group">
          <label for="product-image">Product Image</label>
          <div class="current-image">
            <img src="../img/ethiopian yirgacheffe.jpg" alt="Current product image" class="preview-img" />
            <p class="current-image-label">Current image</p>
          </div>
          <input type="file" id="product-image" accept="image/*" />
        </div>

        <div class="form-actions">
          <a href="../html/admin-dashboard.html" class="cancel-btn">Cancel</a>
          <button type="submit" class="save-btn">Save Changes</button>
        </div>

      </form>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer-placeholder"></div>

  <script>
    const pageType = "admin";
  </script>
  <script src="../js/components.js"></script>

</body>
</html>


</body>
</html>
