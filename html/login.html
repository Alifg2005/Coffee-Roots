<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup form</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../css/loginstyle.css">
    <link rel="stylesheet" href="../css/Super-style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>

<body>

    <div class="container">
        
        <input type="checkbox" id="toggle-state" style="display: none;">

        <div class="form-box login"> 
            <form action="../html/admin-dashboard.html" method="get">
                <img src="../img/Coffee Roots.png" alt="Logo" class="logo">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="Full Name" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button> 
            </form>
        </div>

        <div class="form-box register"> 
            <form action="../html/admin-dashboard.html" method="get"> 
                <img src="../img/Coffee Roots.png" alt="Logo" class="logo">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" placeholder="Full Name" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="btn">Register</button> 
            </form>
        </div>

        <div class="toggle-box"> 
             <div class="toggle-box-left"> 
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <label for="toggle-state" class="btn register-btn">Register</label>
            </div>
            <div class="toggle-box-right">
                <h1>Welcome Back!</h1>
                <p> Already have an account? </p>
                <label for="toggle-state" class="btn login-btn">Login</label>
            </div>
        </div>

    </div>

</body>
</html>
