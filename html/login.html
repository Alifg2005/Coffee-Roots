<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login/Signup form</title>
    <link rel="stylesheet" href="loginstyle.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>

<body>

    <header class="navbar">
        <div class="navbar-inner">
            <a href="Main.html" class="logo-nav">
                <img src="/Coffee Roots.png" alt="Coffee Roots Logo" class="logo-img" />
                <span class="logo-text">Coffee Roots</span>
            </a>
            <nav class="nav-links">
                <a href="Main.html">Products</a>
                <a href="Main.html#contact">Contact</a>
            </nav>
        </div> </header>

    <div class="container">
        
        <input type="checkbox" id="toggle-state" style="display: none;">

        <div class="form-box login"> 
            <form action="#">
                <img src="Coffee Roots.png" alt="Logo" class="logo">
                <h1>Login</h1>
                <div class="input-box">
                    <input type="text" placeholder="username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <div class="forgot-password">
                    <a href="#">Forgot Password?</a>
                </div>
                <button type="submit" class="btn">Login</button> 
            </form>
        </div>

        <div class="form-box register"> 
            <form action="#">
                <img src="Coffee Roots.png" alt="Logo" class="logo">
                <h1>Register</h1>
                <div class="input-box">
                    <input type="text" placeholder="username" required>
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email" required>
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i class="fa-solid fa-lock"></i>
                </div>
                <button type="submit" class="btn">Register</button> 
            </form>
        </div>

        <div class="toggle-box"> 
             <div class="toggle-box-left"> 
                <h1>Hello, Welcome!</h1>
                <p>Don't have an account?</p>
                <label for="toggle-state" class="btn register-btn">Register</label>
            </div>
            <div class="toggle-box-right">
                <h1>Welcome Back!</h1>
                <p> Already have an account? </p>
                <label for="toggle-state" class="btn login-btn">Login</label>
            </div>
        </div>

    </div>

</body>
</html>
